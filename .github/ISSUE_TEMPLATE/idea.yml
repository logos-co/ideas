name: "💡 Submit an Idea"
description: "Propose a structured social or technical solution"
title: "[Idea]: "
labels: ["idea", "under-review"]
body:
  - type: input
    id: idea_title
    attributes:
      label: Idea Title
    validations:
      required: true

  - type: textarea
    id: idea_description
    attributes:
      label: Idea Description
      placeholder: "High-level summary of the idea."
    validations:
      required: true

  - type: textarea
    id: social_problem
    attributes:
      label: Social Problem & Logos Stack
      placeholder: "What specific social problem does this solve? How does the Logos stack uniquely enable this solution?"
    validations:
      required: true

  - type: textarea
    id: previous_attempts
    attributes:
      label: Previous Attempts & Hypotheses
      placeholder: "What has been tried before? Why did it fail?"

  - type: textarea
    id: functional_specs
    attributes:
      label: Functional Specifications
      placeholder: "User stories, FURPS (Functionality, Usability, Reliability, Performance, Supportability), etc."

  - type: textarea
    id: risks_strategy
    attributes:
      label: Risks and Deployment Strategy
      placeholder: "Network effect hurdles, make-or-break criteria, and how you plan to deploy."
