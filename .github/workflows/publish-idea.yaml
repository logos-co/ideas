name: Publish approved ideas

on:
  issues:
    types: [labeled]  # This is correct, but the job needs to check the label name
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to publish manually'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  publish:
    # Logic fix: Ensure it only runs if the label added is 'approved' or 'Approved'
    # Or if it's a manual dispatch.
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issues' && 
        (github.event.label.name == 'approved' || github.event.label.name == 'Approved'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish idea + update README + ideas.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const issueNumber = context.payload.issue ? context.payload.issue.number : parseInt(context.payload.inputs.issue_number);
            
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const issueBody = issue.body || '';
            const author = issue.user?.login || 'unknown';
            const created = (issue.created_at || new Date().toISOString()).slice(0, 10);

            function extractSection(heading) {
              const re = new RegExp(`###\\s+${heading}\\s*\\r?\\n([\\s\\S]*?)(?=\\r?\\n###\\s+|$)`, 'i');
              const m = issueBody.match(re);
              return m ? m[1].trim() : '';
            }

            const ideaTitle = extractSection('Idea Title') || (issue.title || '').replace(/^\[Idea\]:\s*/i, '').trim();
            const ideaDescription = extractSection('Idea Description');
            const socialProblem = extractSection('Social Problem & Logos Stack');
            const previousAttempts = extractSection('Previous Attempts & Hypotheses');
            const functionalSpecs = extractSection('Functional Specifications');
            const risksStrategy = extractSection('Risks and Deployment Strategy');

            if (!ideaTitle || !ideaDescription) {
              core.setFailed('Missing required fields: Idea Title and/or Idea Description.');
              return;
            }

            const slug = ideaTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 80);
            const ideasDir = path.join(process.cwd(), 'ideas');
            const publicDir = path.join(process.cwd(), 'public');
            if (!fs.existsSync(ideasDir)) fs.mkdirSync(ideasDir, { recursive: true });
            if (!fs.existsSync(publicDir)) fs.mkdirSync(publicDir, { recursive: true });

            const filename = `${created}-${slug}-${issueNumber}.md`;
            const ideaPath = path.join(ideasDir, filename);

            const md = [
              '---',
              `id: ${issueNumber}`,
              `title: "${ideaTitle.replace(/"/g, '\\"')}"`,
              `status: approved`,
              `author: "${author}"`,
              `created: "${created}"`,
              `source_issue: ${issueNumber}`,
              '---',
              '',
              '# ' + ideaTitle,
              '',
              '## Description',
              ideaDescription,
              '',
              '## Social Problem & Logos Stack Solution',
              socialProblem || '_No data provided._',
              '',
              '## Previous Attempts & Hypotheses',
              previousAttempts || '_No data provided._',
              '',
              '## Functional Specifications',
              functionalSpecs || '_No data provided._',
              '',
              '## Risks & Deployment Strategy',
              risksStrategy || '_No data provided._'
            ].join('\n');

            fs.writeFileSync(ideaPath, md, 'utf8');

            const files = fs.readdirSync(ideasDir).filter(f => f.endsWith('.md')).sort().reverse();
            
            function parseFrontmatter(text) {
              const m = text.match(/^---\n([\s\S]*?)\n---\n/);
              if (!m) return { data: {}, body: text };
              const data = {};
              m[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx !== -1) {
                  const key = line.slice(0, idx).trim();
                  const val = line.slice(idx + 1).trim().replace(/^"(.*)"$/, '$1');
                  data[key] = val;
                }
              });
              return { data, body: text.slice(m[0].length) };
            }

            const ideas = files.map(file => {
              const content = fs.readFileSync(path.join(ideasDir, file), 'utf8');
              const { data, body } = parseFrontmatter(content);
              // Clean excerpt for README display
              const excerpt = body.replace(/#+.*?\n/g, '').trim().replace(/\s+/g, ' ').slice(0, 250);
              return { ...data, file, url: `ideas/${file}`, excerpt: excerpt };
            }).filter(i => i.title);

            fs.writeFileSync(path.join(publicDir, 'ideas.json'), JSON.stringify({ ideas }, null, 2));

            // --- README UPDATE FIX ---
            const readmePath = path.join(process.cwd(), 'README.md');
            if (fs.existsSync(readmePath)) {
              let readme = fs.readFileSync(readmePath, 'utf8');
              
              // FIX: These were empty in your script!
              const startMarker = '';
              const endMarker = '';

              if (readme.includes(startMarker) && readme.includes(endMarker)) {
                const list = ideas.map(i => 
                  `<details>\n<summary><b>${i.title}</b> (by @${i.author})</summary>\n${i.excerpt}\n<a href="${i.url}">Full details</a>\n</details>`
                ).join('\n\n');

                const markerRe = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'm');
                fs.writeFileSync(readmePath, readme.replace(markerRe, `${startMarker}\n${list}\n${endMarker}`));
              }
            }

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add .');
            try {
              execSync('git diff --cached --quiet');
            } catch (e) {
              execSync(`git commit -m "Publish idea #${issueNumber}"`);
              execSync('git push');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🚀 **Idea Published!** Check it out in the README or in \`ideas/${filename}\`.`
            });
