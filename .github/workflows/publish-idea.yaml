name: Publish approved ideas

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish idea + update README + ideas.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueBody = issue.body || '';
            const author = issue.user?.login || 'unknown';
            const created = (issue.created_at || new Date().toISOString()).slice(0, 10);

            // Extract section from Issue Form body
            function extractSection(heading) {
              const re = new RegExp(`###\\s+${heading}\\s*\\r?\\n([\\s\\S]*?)(?=\\r?\\n###\\s+|$)`, 'i');
              const m = issueBody.match(re);
              return m ? m[1].trim() : '';
            }

            // Core Fields
            const ideaTitle = extractSection('Idea Title') || (issue.title || '').replace(/^\[Idea\]:\s*/i, '').trim();
            const ideaDescription = extractSection('Idea Description');
            
            // New Specialized Fields
            const socialProblem = extractSection('Social Problem & Logos Stack');
            const previousAttempts = extractSection('Previous Attempts & Hypotheses');
            const functionalSpecs = extractSection('Functional Specifications');
            const risksStrategy = extractSection('Risks and Deployment Strategy');

            if (!ideaTitle || !ideaDescription) {
              core.setFailed('Missing required fields: Idea Title and/or Idea Description.');
              return;
            }

            // Slugify for filename
            const slug = ideaTitle
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/(^-|-$)/g, '')
              .slice(0, 80);

            const ideasDir = path.join(process.cwd(), 'ideas');
            const publicDir = path.join(process.cwd(), 'public');
            if (!fs.existsSync(ideasDir)) fs.mkdirSync(ideasDir, { recursive: true });
            if (!fs.existsSync(publicDir)) fs.mkdirSync(publicDir, { recursive: true });

            const filename = `${created}-${slug}-${issueNumber}.md`;
            const ideaPath = path.join(ideasDir, filename);

            if (!fs.existsSync(ideaPath)) {
              const safeTitle = ideaTitle.replace(/"/g, '\\"');

              const md = [
                '---',
                `id: ${issueNumber}`,
                `title: "${safeTitle}"`,
                `status: approved`,
                `author: "${author}"`,
                `created: "${created}"`,
                `source_issue: ${issueNumber}`,
                '---',
                '',
                '# ' + ideaTitle,
                '',
                '## Description',
                ideaDescription,
                '',
                '## Social Problem & Logos Stack Solution',
                socialProblem || '_No data provided._',
                '',
                '## Previous Attempts & Hypotheses',
                previousAttempts || '_No data provided._',
                '',
                '## Functional Specifications',
                functionalSpecs || '_No data provided._',
                '',
                '## Risks & Deployment Strategy',
                risksStrategy || '_No data provided._',
                ''
              ].join('\n');

              fs.writeFileSync(ideaPath, md, 'utf8');
            }

            // Rebuild ideas.json
            const files = fs.readdirSync(ideasDir).filter(f => f.endsWith('.md')).sort().reverse();

            function parseFrontmatter(text) {
              const m = text.match(/^---\n([\s\S]*?)\n---\n/);
              if (!m) return { data: {}, body: text };
              const fm = m[1].split('\n');
              const data = {};
              for (const line of fm) {
                const idx = line.indexOf(':');
                if (idx === -1) continue;
                const key = line.slice(0, idx).trim();
                let val = line.slice(idx + 1).trim();
                val = val.replace(/^"(.*)"$/, '$1');
                data[key] = val;
              }
              return { data, body: text.slice(m[0].length) };
            }

            const ideas = files.map((file) => {
              const full = fs.readFileSync(path.join(ideasDir, file), 'utf8');
              const { data, body } = parseFrontmatter(full);
              const excerpt = body
                .replace(/#+.*?\n/g, '') // Remove headers from excerpt
                .trim()
                .replace(/\s+/g, ' ')
                .slice(0, 280);

              return {
                id: Number(data.id || 0),
                title: data.title || '',
                author: (data.author || '').replace(/^@/, ''),
                created: data.created || '',
                file,
                url: `ideas/${file}`,
                excerpt: excerpt + '...'
              };
            }).filter(i => i.title);

            fs.writeFileSync(
              path.join(publicDir, 'ideas.json'),
              JSON.stringify({ ideas }, null, 2),
              'utf8'
            );

            // Update README
            const readmePath = path.join(process.cwd(), 'README.md');
            if (fs.existsSync(readmePath)) {
              const readme = fs.readFileSync(readmePath, 'utf8');
              const start = '';
              const end = '';

              if (readme.includes(start) && readme.includes(end)) {
                const list = ideas.map(i => {
                  return [
                    '<details>',
                    `<summary><b>${i.title}</b> (by @${i.author})</summary>`,
                    '',
                    i.excerpt,
                    '',
                    `<a href="${i.url}">Read full proposal</a>`,
                    '</details>'
                  ].join('\n');
                }).join('\n\n');

                const markerRe = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
                fs.writeFileSync(readmePath, readme.replace(markerRe, `${start}\n${list}\n${end}`));
              }
            }

            // Git Operations
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add ideas public/ideas.json README.md');

            try {
              execSync('git diff --cached --quiet');
              console.log('No changes to commit.');
            } catch (e) {
              execSync(`git commit -m "Publish idea #${issueNumber}: ${ideaTitle.slice(0, 30)}"`);
              execSync('git push');
            }

            // Feedback Comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🚀 **Idea Published!**\n\nYour proposal has been formalized and added to the repository.\n\n- **File:** \`ideas/${filename}\`\n- **Live Entry:** [View in README](../blob/main/README.md)`
            });
